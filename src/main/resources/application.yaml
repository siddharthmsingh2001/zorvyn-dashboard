spring:
  application:
    name: ZorvynDashboard
  main:
    banner-mode: off
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    clean-disabled: false

logging:
  level:
    org:
      springframework:
        security: TRACE
    com:
      zorvyn:
        dashboard: TRACE
    root: WARN

server:
    port: 8080
    servlet:
      context-path: "/api"

springdoc:
  swagger-ui:
    path: /swagger-ui.html
  api-docs:
    path: /api-docs
  show-login-endpoint: true